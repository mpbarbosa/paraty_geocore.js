# Docker Tests — paraty_geocore.js
# Builds the test image and runs the full Jest suite inside an isolated container.
# Runs independently from the main ci.yml workflow for clear per-job feedback.
name: Docker Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-docker:
    name: Jest (Docker / node:20-alpine)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        run: |
          docker build \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            -t paraty_geocore-test \
            -f Dockerfile.test \
            .

      - name: Run tests inside Docker
        run: |
          docker run --rm \
            -e CI=true \
            -v "${{ github.workspace }}/coverage:/app/coverage" \
            paraty_geocore-test \
            npm test -- --runInBand --coverage

      - name: Upload coverage report
        # Upload even when tests fail — coverage report is most useful on failures.
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: docker-coverage-report
          path: coverage/
          retention-days: 14
